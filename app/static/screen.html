<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Scrying Pool: Big Screen</title>
<link rel="stylesheet" href="/static/shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body {
    padding: 2rem 3rem;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .brand { text-align: center; margin-bottom: 1.5rem; }
  .brand h1 {
    font-size: 3rem; margin: 0; color: var(--accent); letter-spacing: 0;
    font-weight: 700;
  }
  .brand p  { margin: 0.1rem 0; color: var(--ink-dim); font-style: italic; font-size: 1.1rem; }

  .main { flex: 1; display: grid; grid-template-columns: 1fr 340px; gap: 2rem; }
  .main.no-qr { grid-template-columns: 1fr; }

  .stage {
    padding: 2rem 2.5rem;
    display: flex; flex-direction: column; justify-content: center;
    min-height: 60vh;
  }
  .stage .q { font-family: var(--serif); font-size: 3rem; line-height: 1.2; margin: 0.3rem 0 1.2rem; }
  .stage .cat-tag { margin-bottom: 0.8rem; }
  .stage .tag { font-size: 1rem; padding: 0.3rem 0.9rem; }
  .stage .countdown { font-size: 5rem; margin: 0.5rem 0 1.5rem; }

  .qr-box {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 1.5rem; text-align: center;
  }
  .qr-box .label { color: var(--ink-dim); margin-bottom: 0.5rem; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .qr-box .url {
    font-family: var(--mono); color: var(--accent); font-size: 1.1rem;
    margin-top: 0.75rem; word-break: break-all;
  }
  #qrcode img, #qrcode canvas { border: 4px solid var(--blue); border-radius: 0; background: #fff; }

  .bars .bar-label { font-size: 1.6rem; flex-basis: 35%; }
  .bars .bar-track { height: 44px; }
  .bars .bar-count { font-size: 1.6rem; flex-basis: 4rem; }

  .reveal-word { font-size: 8rem; line-height: 1; margin: 2rem 0 1rem; }
  .reveal-strategy { font-size: 1.6rem; }

  .final-story {
    font-family: var(--serif); font-size: 2rem; line-height: 1.55;
    max-width: 1100px; margin: 1rem auto;
  }
  .final-story p { margin: 0.8rem 0; }
  .final-story .hl {
    color: var(--accent);
    font-weight: 700;
  }
  .final-story .char {
    color: var(--accent);
    font-style: italic;
  }
  .final-title {
    font-family: var(--sans); text-align: center;
    font-size: 3.5rem; color: var(--accent); margin: 0 0 1.5rem;
    font-weight: 700;
  }
  .footer { text-align: center; color: var(--ink-dim); margin-top: 1rem; font-size: 0.85rem; }

  @media (max-width: 1100px) { .main { grid-template-columns: 1fr; } .qr-box { padding: 1rem; } }
</style>
</head>
<body>
  <div class="brand">
    <h1>✦ THE SCRYING POOL ✦</h1>
    <p>gaze in. cast your vote.</p>
  </div>

  <div id="root" class="main"></div>

  <div class="footer mono">PyConDE &amp; PyData 26 · Lightning Talks</div>

<script>
(() => {
  const PUBLIC_URL = "{{PUBLIC_URL}}";
  const root = document.getElementById('root');
  let state = null;
  let countdownTimer = null;

  function wsUrl() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    return `${proto}://${location.host}/ws/screen`;
  }

  function connect() {
    const ws = new WebSocket(wsUrl());
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') { state = msg.data; render(); }
    };
    ws.onclose = () => setTimeout(connect, 1500);
  }

  function render() {
    if (!state) { root.innerHTML = '<div class="card stage">Awakening the pool…</div>'; return; }

    if (state.phase === 'final') {
      renderFinal();
      return;
    }

    if (state.phase === 'waiting' || !state.round) {
      root.className = 'main';
      root.innerHTML = `
        <div class="card stage" style="text-align:center;">
          <div class="tag" style="align-self:center;">INTERMISSION</div>
          <h2 style="font-size: 2.4rem; margin-top: 1rem;">The pool rests between visions.</h2>
          <p style="font-size: 1.3rem; color: var(--ink-dim);">Round ${state.round_index + 1} of ${state.total_rounds} awaits.</p>
        </div>
        <div class="card qr-box">
          <div class="label">Join the vote</div>
          <div id="qrcode"></div>
          <div class="url">${PUBLIC_URL}</div>
        </div>`;
      drawQR();
      return;
    }

    const r = state.round;

    if (state.phase === 'voting') {
      root.className = 'main';
      root.innerHTML = `
        <div class="card stage">
          <div class="cat-tag"><span class="tag">${r.category_label}</span></div>
          <div class="q">${r.poll_question}</div>
          <div id="countdown" class="countdown">--</div>
          <div id="bars" class="bars"></div>
        </div>
        <div class="card qr-box">
          <div class="label">Join the vote</div>
          <div id="qrcode"></div>
          <div class="url">${PUBLIC_URL}</div>
          <div style="margin-top: 1rem; font-size: 1.3rem; color: var(--teal);">${r.total_votes} vote${r.total_votes === 1 ? '' : 's'}</div>
        </div>`;
      drawQR();
      renderBars(r);
      startCountdown(r);
      return;
    }

    if (state.phase === 'revealed') {
      clearInterval(countdownTimer);
      const winWord = r.winning_index != null ? r.options[r.winning_index] : '???';
      root.className = 'main no-qr';
      root.innerHTML = `
        <div class="card stage" style="text-align: center;">
          <div class="cat-tag"><span class="tag">${r.category_label}</span></div>
          <div class="q" style="font-size: 2rem; color: var(--ink-dim);">${r.poll_question}</div>
          <div class="reveal-word">${winWord}</div>
          ${r.strategy_label ? `<div class="reveal-strategy">· ${r.strategy_label} ·<br><span style="font-style:italic;">${r.strategy_flavour || ''}</span></div>` : ''}
          <div style="height: 2rem;"></div>
          <div id="bars" class="bars"></div>
        </div>`;
      renderBars(r);
      return;
    }
  }

  function renderBars(r) {
    const host = document.getElementById('bars');
    if (!host) return;
    const max = Math.max(1, ...r.tally);
    host.innerHTML = r.options.map((opt, i) => {
      const pct = Math.round((r.tally[i] / max) * 100);
      const isWinner = r.winning_index === i;
      return `
        <div class="bar-row">
          <div class="bar-label">${opt}</div>
          <div class="bar-track"><div class="bar-fill ${isWinner ? 'winner' : ''}" style="width:${pct}%"></div></div>
          <div class="bar-count">${r.tally[i]}</div>
        </div>`;
    }).join('');
  }

  function startCountdown(r) {
    clearInterval(countdownTimer);
    const el = document.getElementById('countdown');
    const closesAt = r.closes_at ? r.closes_at * 1000 : null;
    function tick() {
      if (!closesAt) { el.textContent = '--'; return; }
      const left = Math.max(0, Math.ceil((closesAt - Date.now()) / 1000));
      el.textContent = `${left}s`;
      el.classList.toggle('urgent', left <= 5);
      if (left <= 0) clearInterval(countdownTimer);
    }
    tick();
    countdownTimer = setInterval(tick, 250);
  }

  function drawQR() {
    // The screen DOM is rebuilt on every phase change, so the old #qrcode
    // element (and its rendered canvas) is destroyed. We draw whenever the
    // container exists and is empty; no sticky "already drawn" flag.
    const el = document.getElementById('qrcode');
    if (!el || el.children.length > 0) return;
    try {
      new QRCode(el, { text: PUBLIC_URL, width: 260, height: 260, correctLevel: QRCode.CorrectLevel.M });
    } catch(e) { el.textContent = PUBLIC_URL; }
  }

  function renderFinal() {
    clearInterval(countdownTimer);
    root.className = 'main no-qr';
    // Prefer segmented form (with hl flags) so we can highlight filled-in
    // words in blue + bold, matching the host preview. Fall back to the
    // plain paragraph list if the server didn't send segments.
    const segments = state.final_story_segments;
    let storyHtml;
    if (Array.isArray(segments) && segments.length) {
      storyHtml = segments.map(paragraph => {
        const inner = paragraph.map(seg => {
          if (seg.hl) return `<span class="hl">${escapeHtml(seg.text)}</span>`;
          if (seg.char) return `<span class="char">${escapeHtml(seg.text)}</span>`;
          return escapeHtml(seg.text);
        }).join('');
        return `<p>${inner}</p>`;
      }).join('');
    } else {
      const paragraphs = state.final_story || [];
      storyHtml = paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join('');
    }

    root.innerHTML = `
      <div class="card stage" style="text-align:center;">
        <div class="final-title">✦ The Tale is Told ✦</div>
        <div class="final-story">${storyHtml}</div>
        <div style="margin-top: 2rem; color: var(--ink-dim); font-style: italic;">✦ fin ✦</div>
      </div>`;
  }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  connect();
})();
</script>
</body>
</html>
